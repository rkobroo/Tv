<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Sports TV</title>
    <link href="https://unpkg.com/video.js@8/dist/video-js.min.css" rel="stylesheet" />
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0; padding: 0; line-height: 1.5;
        background: #0b0f14; color: #e8edf2;
      }
      .muted { opacity: .85; }
      .danger { color: #ff7b7b; }
      .success { color: #5be49b; }

      header { padding: 12px 16px; background: #101722; border-bottom: 1px solid #1c2736; }
      header .topbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      header h1 { margin: 0; font-size: 16px; font-weight: 600; }

      .toolbar { display: flex; gap: 8px; }
      .toolbar button {
        background: #0f1722; color: #e8edf2; border: 1px solid #233143; border-radius: 8px; padding: 8px 12px; cursor: pointer;
      }
      .toolbar button:hover { background: #1a2a42; }

      .layout { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 56px); }
      aside { border-right: 1px solid #1c2736; background: #0d131d; overflow-y: auto; }
      main { padding: 14px; display: flex; flex-direction: column; }

      .panel { padding: 12px; }
      .search-row { display: flex; gap: 8px; }
      .search-row input { 
        flex: 1; background: #0f1722; color: #e8edf2; border: 1px solid #233143; 
        border-radius: 8px; padding: 8px 10px; font-size: 13px; 
      }
      .search-row button { background: #0f1722; color: #e8edf2; border: 1px solid #233143; border-radius: 8px; padding: 8px 10px; cursor: pointer; }

      .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
      .chip { background: #0f1722; border: 1px solid #233143; padding: 4px 10px; border-radius: 999px; font-size: 11px; cursor: pointer; }
      .chip.active { background: #1a2a42; border-color: #365278; }

      .channels { margin-top: 10px; max-height: calc(100vh - 200px); overflow-y: auto; }
      .channel-card { 
        display: flex; align-items: center; gap: 10px; padding: 10px; 
        border-radius: 8px; background: #0f1722; border: 1px solid #233143; margin-bottom: 6px; cursor: pointer; 
      }
      .channel-card:hover { background: #132033; }
      .channel-card.playing { border-color: #5be49b; background: #0f1a12; }
      .channel-logo { width: 40px; height: 40px; border-radius: 6px; object-fit: contain; background: #000; flex-shrink: 0; }
      .channel-title { font-size: 13px; font-weight: 600; }
      .channel-meta { font-size: 11px; opacity: .7; }

      .player-wrap { flex: 1; display: flex; flex-direction: column; min-height: 400px; }
      .video-js { width: 100%; flex: 1; border-radius: 10px; background: #000; min-height: 300px; }
      .now-playing { font-size: 13px; margin-bottom: 8px; }

      .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #233143; border-top: 2px solid #7ecbff; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 6px; }
      @keyframes spin { to { transform: rotate(360deg); } }

      footer { padding: 10px 16px; font-size: 11px; border-top: 1px solid #1c2736; }
      footer a { color: #7ecbff; }
    </style>
  </head>
  <body>
    <header>
      <div class="topbar">
        <h1>Live Sports TV</h1>
        <div class="toolbar">
          <button id="refreshBtn">Refresh</button>
        </div>
        <span id="status" class="muted"></span>
      </div>
    </header>

    <div class="layout">
      <aside>
        <div class="panel">
          <div class="search-row">
            <input id="search" type="text" placeholder="Search..." />
            <button id="clearBtn">✕</button>
          </div>
          <div class="chips">
            <div class="chip active" data-cat="all">All</div>
            <div class="chip" data-cat="cricket">Cricket</div>
            <div class="chip" data-cat="football">Football</div>
          </div>
          <div id="channelList" class="channels"></div>
        </div>
      </aside>

      <main>
        <div class="player-wrap">
          <div class="now-playing" id="nowPlaying">Select a channel</div>
          <video id="videoPlayer" class="video-js" controls preload="auto" playsinline></video>
        </div>
      </main>
    </div>

    <footer>
      Source: <a href="https://github.com/iptv-org/iptv" target="_blank">iptv-org/iptv</a> | 
      <a href="https://github.com/iptv-org/database" target="_blank">iptv-org/database</a>
    </footer>

    <script src="https://unpkg.com/video.js@8/dist/video.min.js"></script>
    <script>
      const statusEl = document.getElementById('status');
      const searchEl = document.getElementById('search');
      const clearBtn = document.getElementById('clearBtn');
      const refreshBtn = document.getElementById('refreshBtn');
      const channelListEl = document.getElementById('channelList');
      const nowPlayingEl = document.getElementById('nowPlaying');

      let allChannels = [];
      let currentChannel = null;
      let activeCat = 'all';

      // Country names
      const countries = {
        'NP': 'Nepal', 'IN': 'India', 'BD': 'Bangladesh', 'PK': 'Pakistan',
        'LK': 'Sri Lanka', 'BT': 'Bhutan', 'US': 'USA', 'GB': 'UK',
        'AU': 'Australia', 'CA': 'Canada', 'TH': 'Thailand', 'MY': 'Malaysia'
      };

      const flags = {
        'NP': '🇳🇵', 'IN': '🇮🇳', 'BD': '🇧🇩', 'PK': '🇵🇰', 'LK': '🇱🇰',
        'BT': '🇧🇹', 'US': '🇺🇸', 'GB': '🇬🇧', 'AU': '🇦🇺', 'CA': '🇨🇦'
      };

      function setStatus(msg) {
        statusEl.textContent = msg;
      }

      // Video.js setup
      const player = videojs('videoPlayer', {
        autoplay: true,
        controls: true,
        preload: 'auto',
        fluid: true,
        html5: {
          vhs: {
            overrideNative: true,
            enableWorker: true
          }
        }
      });

      player.on('error', () => {
        const err = player.error();
        setStatus('Stream error - trying another...');
        setTimeout(() => playNextChannel(), 2000);
      });

      player.on('playing', () => setStatus(''));
      player.on('waiting', () => setStatus('Buffering...'));
      player.on('canplay', () => setStatus(''));

      // Parse M3U
      function parseM3U(text) {
        const lines = text.split(/\r?\n/);
        const channels = [];
        let info = null;

        for (const line of lines) {
          const t = line.trim();
          if (t.startsWith('#EXTINF:')) {
            const name = (t.match(/,#\s*(.+)/) || [])[1] || 'Unknown';
            info = {
              name,
              id: (t.match(/tvg-id="([^"]*)"/) || [])[1] || '',
              country: ((t.match(/tvg-country="([^"]*)"/) || [])[1] || '').toUpperCase(),
              logo: (t.match(/tvg-logo="([^"]*)"/) || [])[1] || '',
              group: (t.match(/group-title="([^"]*)"/) || [])[1] || ''
            };
          } else if (info && !t.startsWith('#') && (t.includes('.m3u8') || t.includes('.m3u'))) {
            channels.push({ ...info, url: t });
            info = null;
          }
        }
        return channels;
      }

      // Filter sports channels
      function filterSports(channels) {
        const kw = /sports|cricket|football|soccer|espn|star\s*sports|sony\s*(six|ten|liv)|bein|premier|laliga|bundesliga|serie|fox\s*sports|sky\s*sports|willow|ptv|t\s*sports/i;
        return channels.filter(ch => {
          const n = ch.name.toLowerCase();
          const g = ch.group.toLowerCase();
          if (kw.test(n) || kw.test(g)) return true;
          if (['NP', 'IN', 'BD', 'PK', 'LK'].includes(ch.country)) return true;
          return false;
        });
      }

      // Get proxy URL - use server proxy
      function getStreamUrl(url) {
        return `/api/hls?url=${encodeURIComponent(url)}`;
      }

      // Load channels
      async function loadChannels() {
        setStatus('Loading channels...');
        
        const urls = [
          'https://iptv-org.github.io/iptv/index.m3u',
          'https://raw.githubusercontent.com/iptv-org/iptv/master/index.m3u'
        ];

        for (const url of urls) {
          try {
            const resp = await fetch(url);
            if (resp.ok) {
              const text = await resp.text();
              let channels = parseM3U(text);
              channels = filterSports(channels);
              if (channels.length === 0) channels = parseM3U(text);
              
              allChannels = channels;
              setStatus(`${channels.length} channels loaded`);
              renderList();
              return;
            }
          } catch (e) {
            console.warn('Failed:', url, e);
          }
        }
        
        setStatus('Failed to load - check internet');
      }

      // Filter and sort
      function getFilteredChannels() {
        let ch = allChannels;
        
        // Category
        if (activeCat === 'cricket') {
          ch = ch.filter(c => /cricket|willow|star\s*sports|sony\s*(ten|six|liv)/i.test(c.name));
        } else if (activeCat === 'football') {
          ch = ch.filter(c => /football|soccer|premier|laliga|bundesliga|serie/i.test(c.name));
        }
        
        // Search
        const q = searchEl.value.trim().toLowerCase();
        if (q) {
          ch = ch.filter(c => c.name.toLowerCase().includes(q) || c.country.toLowerCase().includes(q));
        }
        
        // Sort by priority
        const priority = ['sony', 'star sports', 'willow', 'ptv', 't sports', 'espn'];
        ch.sort((a, b) => {
          const ia = priority.findIndex(p => a.name.toLowerCase().includes(p));
          const ib = priority.findIndex(p => b.name.toLowerCase().includes(p));
          if (ia !== -1 || ib !== -1) {
            if (ia === -1) return 1;
            if (ib === -1) return -1;
            return ia - ib;
          }
          // Country priority
          const order = ['NP', 'IN', 'BD', 'PK', 'LK'];
          const oa = order.indexOf(a.country);
          const ob = order.indexOf(b.country);
          if (oa !== ob) {
            if (oa === -1) return 1;
            if (ob === -1) return -1;
            return oa - ob;
          }
          return a.name.localeCompare(b.name);
        });
        
        return ch;
      }

      // Render list
      function renderList() {
        const channels = getFilteredChannels();
        channelListEl.innerHTML = '';
        
        if (channels.length === 0) {
          channelListEl.innerHTML = '<div style="padding:20px;text-align:center;color:#888;">No channels found</div>';
          return;
        }
        
        channels.forEach(ch => {
          const div = document.createElement('div');
          div.className = 'channel-card' + (currentChannel?.url === ch.url ? ' playing' : '');
          div.innerHTML = `
            <img class="channel-logo" src="${ch.logo}" onerror="this.style.display='none'" alt="">
            <div>
              <div class="channel-title">${flags[ch.country] || ''} ${ch.name}</div>
              <div class="channel-meta">${countries[ch.country] || ch.country || ''}</div>
            </div>
          `;
          div.onclick = () => playChannel(ch);
          channelListEl.appendChild(div);
        });
      }

      // Play channel
      function playChannel(ch) {
        currentChannel = ch;
        nowPlayingEl.textContent = `Playing: ${ch.name}`;
        setStatus('Loading stream...');
        
        document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('playing'));
        renderList();
        
        try {
          player.reset();
          player.src({ src: getStreamUrl(ch.url), type: 'application/x-mpegURL' });
          player.play().catch(() => setStatus('Click play to start'));
        } catch (e) {
          setStatus('Error loading stream');
        }
      }

      // Try next channel if error
      let currentIndex = 0;
      function playNextChannel() {
        const channels = getFilteredChannels();
        const startIdx = channels.findIndex(c => c.url === currentChannel?.url);
        for (let i = startIdx + 1; i < channels.length; i++) {
          playChannel(channels[i]);
          return;
        }
        setStatus('No working streams found');
      }

      // Events
      refreshBtn.onclick = () => loadChannels();
      clearBtn.onclick = () => { searchEl.value = ''; renderList(); };
      searchEl.oninput = () => renderList();

      document.querySelectorAll('.chip').forEach(chip => {
        chip.onclick = () => {
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeCat = chip.dataset.cat;
          renderList();
        };
      });

      // Start
      loadChannels();
    </script>
  </body>
</html>
