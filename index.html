<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>RKO LIVE TV</title>
  <link rel="manifest" href="/manifest.json" />
  <link href="https://unpkg.com/video.js@8/dist/video-js.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui; margin: 0; background: #111; color: #fff; }
    header { padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; }
    header h1 { margin: 0 0 12px 0; font-size: 20px; }
    .input-row { display: flex; gap: 10px; }
    .url-input { flex: 1; padding: 12px 15px; font-size: 14px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; }
    .url-input:focus { border-color: #4a9eff; outline: none; }
    .load-btn { padding: 12px 24px; background: #4a9eff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .load-btn:hover { background: #3a8eef; }
    
    .container { display: flex; height: calc(100vh - 130px); }
    .sidebar { width: 320px; background: #1a1a1a; border-right: 1px solid #333; overflow-y: auto; }
    .search-row { padding: 10px; border-bottom: 1px solid #333; background: #151515; }
    .search-input { width: 100%; padding: 10px 15px; background: #2a2a2a; color: #fff; border: 1px solid #555; border-radius: 8px; font-size: 14px; }
    .search-input:focus { border-color: #4a9eff; outline: none; background: #333; }
    
    .channels { padding: 8px; }
    .channel { display: flex; align-items: center; gap: 12px; padding: 10px; margin-bottom: 6px; background: #252525; border-radius: 8px; cursor: pointer; }
    .channel:hover { background: #333; }
    .channel.playing { background: #1a3a1a; border: 1px solid #3a5a3a; }
    .logo { width: 48px; height: 48px; background: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .logo img { width: 100%; height: 100%; object-fit: contain; }
    .logo span { font-size: 18px; color: #666; }
    .ch-info { flex: 1; }
    .ch-name { font-weight: 600; font-size: 14px; }
    .ch-country { font-size: 12px; color: #888; }
    
    .main { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; }
    .now-playing { padding: 12px 16px; font-size: 14px; color: #888; }
    .video-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .video-wrap video { width: 100%; height: 100%; background: #000; border-radius: 12px; }
    
    .loading { text-align: center; padding: 40px; color: #888; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid #333; border-top: 3px solid #4a9eff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .chips { display: flex; gap: 8px; padding: 10px; flex-wrap: wrap; border-bottom: 1px solid #333; }
    .chip { padding: 6px 14px; background: #252525; border-radius: 20px; font-size: 12px; cursor: pointer; }
    .chip.active { background: #4a9eff; }
    
    .live-match { display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 8px; background: linear-gradient(135deg, #1a2a1a 0%, #252525 100%); border-radius: 10px; cursor: pointer; border: 1px solid #2a4a2a; }
    .live-match:hover { background: linear-gradient(135deg, #2a3a2a 0%, #2f2f2f 100%); border-color: #4a6a4a; }
    .live-badge { background: #e00; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .match-teams { flex: 1; text-align: center; }
    .match-teams .teams { font-weight: 600; font-size: 13px; }
    .match-teams .time { font-size: 11px; color: #888; margin-top: 4px; }
    .match-info { text-align: center; font-size: 11px; color: #888; }
    
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-overlay.show { display: flex; }
    .modal { background: #1a1a1a; border-radius: 16px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; border: 1px solid #333; }
    .modal-header { padding: 16px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { margin: 0; font-size: 18px; }
    .modal-close { background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
    .modal-body { padding: 16px; }
    .stream-link { display: block; padding: 14px 16px; margin-bottom: 10px; background: #252525; border-radius: 10px; cursor: pointer; border: 1px solid #333; transition: all 0.2s; }
    .stream-link:hover { background: #2f2f2f; border-color: #4a9eff; transform: translateX(4px); }
    .stream-link .name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .stream-link .quality { font-size: 11px; color: #4a9eff; }
    .match-detail { background: #252525; padding: 16px; border-radius: 10px; margin-bottom: 16px; }
    .match-detail .vs { font-size: 24px; font-weight: bold; text-align: center; margin: 10px 0; }
    .match-detail .league { font-size: 12px; color: #888; text-align: center; }
    
    /* Floating Player */
    .float-player { position: fixed; bottom: 20px; right: 20px; z-index: 2147483647; background: #000; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); overflow: hidden; transition: all 0.3s ease; cursor: move; }
    .float-player.collapsed { width: 60px !important; height: 45px !important; }
    .float-player.size-small { width: 200px; height: 150px; }
    .float-player.size-medium { width: 420px; height: 320px; }
    .float-player.size-large { width: 640px; height: 480px; }
    .float-player iframe { width: 100%; height: 100%; border: none; }
    .float-controls { position: absolute; top: 0; left: 0; right: 0; height: 30px; background: rgba(0,0,0,0.7); display: flex; justify-content: space-between; align-items: center; padding: 0 8px; cursor: move; }
    .float-btn { background: none; border: none; color: #fff; font-size: 14px; cursor: pointer; padding: 4px 10px; min-width: 32px; }
    .float-btn:hover { color: #4a9eff; }
    .float-title { color: #fff; font-size: 13px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1; }
    
    /* Mobile Responsive */
    @media (max-width: 900px), (max-height: 600px) {
      .container { flex-direction: column !important; height: auto !important; }
      .sidebar { width: 100% !important; height: auto !important; max-height: 40vh !important; border-right: none !important; border-bottom: 1px solid #333; }
      .sidebar { flex: 0 0 auto !important; }
      .main { width: 100% !important; height: 45vh !important; flex: none !important; }
      header { padding: 10px; }
      header h1 { font-size: 16px; }
      .input-row { flex-wrap: wrap; }
      .url-input, .load-btn { width: 100%; padding: 14px; font-size: 16px; }
      #presetSelect { width: 100%; padding: 14px; font-size: 16px; max-width: 100% !important; }
      .search-input, .chip { font-size: 16px; padding: 12px; }
      .ch-name { font-size: 16px; }
      .ch-country { font-size: 14px; }
      .channel { padding: 14px; }
      .logo { width: 40px; height: 40px; }
      .now-playing { font-size: 14px; padding: 12px; }
      .search-row, .chips { padding: 10px; }
      .chip { padding: 8px 14px; font-size: 13px; }
      .float-player.size-medium { width: 95vw; height: 55vw; max-height: 60vh; }
      .float-player.size-large { width: 98vw; height: 70vw; }
      .float-controls { height: 34px; }
      .float-btn { font-size: 14px; padding: 5px 10px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <aside class="sidebar">

      <div class="chips">
        <div class="chip active" data-cat="all">All</div>
        <div class="chip" data-cat="sports">Sports</div>
        <div class="chip" data-cat="news">News</div>
        <div class="chip" data-cat="movies">Movies</div>

      </div>

    </aside>

    <main class="main">
      <div class="now-playing" id="nowPlaying">Select a channel to play</div>

        <video id="player" controls preload="auto" playsinline></video>
      </div>

  </div>
  
  <div class="modal-overlay" id="streamModal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="modalTitle">Streaming Links</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    // Check for stream param to auto-play in popup
    const urlParams = new URLSearchParams(window.location.search);
    const streamUrl = urlParams.get('stream');
    
    window.addEventListener('DOMContentLoaded', () => {
      if (streamUrl) {
        // We're in popup - auto play the stream
        document.getElementById('floatPlayer').style.display = 'none';
        document.querySelector('.container').style.height = '100vh';
        
        const player = document.getElementById('player');
        player.style.display = 'block';
        
        if (streamUrl.includes('.m3u8')) {
          if (typeof Hls !== 'undefined' && Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(player);
            player.play();
          }
        } else {
          // iframe for non-m3u8 URLs
          let iframe = document.getElementById('yonoFrame');
          if (!iframe) {
            iframe = document.createElement('iframe');
            iframe.id = 'yonoFrame';
            iframe.style.cssText = 'width:100%;height:100%;border:none;';
            document.querySelector('.video-wrap').appendChild(iframe);
          }
          player.style.display = 'none';
          iframe.style.display = 'block';
          iframe.src = streamUrl;
        }
        
        document.getElementById('nowPlaying').textContent = 'Playing in Popup';
      }
    });
    
    const player = document.getElementById('player');
    const channelListEl = document.getElementById('channelList');
    const nowPlayingEl = document.getElementById('nowPlaying');
    const searchInput = document.getElementById('searchInput');
    const playlistUrlInput = document.getElementById('playlistUrl');

    let allChannels = [];
    let currentChannel = null;
let hls = null;
    let prefetchHls = null;
    let prefetchPlayer = null;
    
    // Prefetch URL for faster load
    function prefetchUrl(url) {
      if (url && url.includes('.m3u8') && typeof Hls !== 'undefined') {
        if (!prefetchPlayer) {
          prefetchPlayer = document.createElement('video');
          prefetchPlayer.muted = true;
          prefetchPlayer.style.display = 'none';
          document.body.appendChild(prefetchPlayer);
        }
        if (prefetchHls) prefetchHls.destroy();
        prefetchHls = new Hls({fragLoadingMaxRetry: 1, manifestLoadingMaxRetry: 1});
        prefetchHls.loadSource(url);
        prefetchHls.attachMedia(prefetchPlayer);
      }
    }
    
    let activeCategory = 'all';
    let isLiveMatchesMode = false;
let cachedMatches = null;
    let cachedStreamLinks = {};
    
    function closeModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('streamModal').classList.remove('show');
    }
    
    function showStreamLinks(match) {
      const modal = document.getElementById('streamModal');
      const modalTitle = document.getElementById('modalTitle');
      const modalBody = document.getElementById('modalBody');
      
      modalTitle.textContent = `${match.team1} vs ${match.team2}`;
      
      const detailHtml = `
        <div class="match-detail">
          <div class="league">${match.league}</div>
          <div class="vs">${match.team1} <span style="color:#4a9eff">VS</span> ${match.team2}</div>
          <div class="match-info">${match.stadium}</div>
        </div>
      `;
      
      linksHtml += `
        <div class="stream-link" onclick="openMatchPage('${match.id}')">
          <div class="name">Open Match Page</div>
          <div class="quality">Click to get HD/Smooth links</div>
        </div>
      `;
      
      modalBody.innerHTML = detailHtml + linksHtml;
      modal.classList.add('show');
    }
    
    function playStream(url) {
      closeModal();
      playChannel({ name: 'Live Stream', url: url, group: 'Live' });
    }
    
    function openMatchPage(matchId) {
      closeModal();
      // Show buttons to open newsecrettips page
      const matchUrl = 'https://www.newsecrettips.com/p/match-data.html?id=' + matchId;
      nowPlayingEl.textContent = 'Opening match page...';
      
      // Open in new tab
      window.open(matchUrl, '_blank');
      
      // Also show in iframe
      player.style.display = 'none';
      let iframe = document.getElementById('yonoFrame');
      if (!iframe) {
        iframe = document.createElement('iframe');
        iframe.id = 'yonoFrame';
        iframe.style.cssText = 'width:100%;height:100%;border:none;';
        iframe.setAttribute('allowfullscreen', '');
        document.querySelector('.video-wrap').appendChild(iframe);
      }
      iframe.src = matchUrl;
      iframe.style.display = 'block';
    }

    function renderLiveMatches() {
      channelListEl.innerHTML = '<div style="padding:20px;text-align:center;">No live matches available</div>';
    }

    const flags = { 'NP': '🇳🇵', 'IN': '🇮🇳', 'BD': '🇧🇩', 'PK': '🇵🇰', 'LK': '🇱🇰', 'BT': '🇧🇹', 'US': '🇺🇸', 'GB': '🇬🇧', 'AU': '🇦🇺', 'CA': '🇨🇦', 'IT': '🇮🇹', 'DE': '🇩🇪', 'FR': '🇫🇷', 'ES': '🇪🇸', 'BR': '🇧🇷', 'MX': '🇲🇽', 'JP': '🇯🇵', 'KR': '🇰🇷', 'CN': '🇨🇳', 'RU': '🇷🇺' };
    const countries = { 'NP': 'Nepal', 'IN': 'India', 'BD': 'Bangladesh', 'PK': 'Pakistan', 'LK': 'Sri Lanka', 'BT': 'Bhutan', 'US': 'USA', 'GB': 'UK', 'AU': 'Australia', 'CA': 'Canada', 'IT': 'Italy', 'DE': 'Germany', 'FR': 'France', 'ES': 'Spain', 'BR': 'Brazil', 'MX': 'Mexico', 'JP': 'Japan', 'KR': 'South Korea', 'CN': 'China', 'RU': 'Russia' };

    // Load preset source
    function loadPreset() {
      const select = document.getElementById('presetSelect');
      const url = select.value;
      
      // Watch IPL with Ads - show stream options
      if (url === '__IPL_ADS__') {
        allChannels = [
          { name: 'Star Sports 1', url: 'https://iplstreams.com/star-sports-hindi', group: 'IPL', logo: 'https://i.imgur.com/Js5Eg2V.png' },
          { name: 'Star Sports 2', url: 'https://iplstreams.com/star-sports-2', group: 'IPL', logo: 'https://i.imgur.com/Js5Eg2V.png' },
          { name: 'Willow TV', url: 'https://iplstreams.com/willow-2', group: 'IPL', logo: 'https://i.imgur.com/MzxqTMf.png' },
          { name: 'Willow TV 2', url: 'https://iplstreams.com/willow-2', group: 'IPL', logo: 'https://i.imgur.com/eg7RgjP.png' },
          { name: 'Willow TV IPL', url: 'https://iplstreams.com/willow-2', group: 'IPL', logo: 'https://i.imgur.com/eg7RgjP.png' }
        ];
        channelListEl.innerHTML = '';
        allChannels.forEach((ch, idx) => {
          const div = document.createElement('div');
          div.className = 'stream-link';
          const logoHtml = ch.logo ? `<img src="${ch.logo}" style="height:30px;margin-right:8px;vertical-align:middle;">` : '';
          div.innerHTML = `<div class="name">${logoHtml}${ch.name}</div><div class="quality">${ch.group}</div>`;
          div.onclick = () => {
            showFloatPlayer(ch.url, ch.name);
            nowPlayingEl.innerHTML = `Playing: ${ch.name}`;
          };
          channelListEl.appendChild(div);
        });
        return;
      }
      
// Premium Channels - direct m3u8 with logos
      if (url === '__PREMIUM_CHANNELS__') {

    // Parse M3U
    function parseM3U(text) {
      const channels = [];
      const lines = text.split(/\r?\n/);
      let info = null;

      for (const line of lines) {
        const t = line.trim();
        
        if (t.startsWith('#EXTINF:') || t.startsWith('#EXTINF:-')) {
          const parts = t.split(',');
          const name = parts[1]?.trim() || 'Unknown';
          const country = ((t.match(/tvg-country="([^"]*)"/) || [])[1] || '').toUpperCase();
          const logo = (t.match(/tvg-logo="([^"]*)"/) || [])[1] || '';
          const group = (t.match(/group-title="([^"]*)"/) || [])[1] || '';
          info = { name, country, logo, group };
        }
        else if (info && !t.startsWith('#') && (t.includes('.m3u8') || t.includes('.m3u'))) {
          // Generate logo URL if not provided
          let logoUrl = info.logo;
          if (!logoUrl || !logoUrl.startsWith('http')) {
            const slug = info.name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');
            logoUrl = `https://raw.githubusercontent.com/iptv-org/logos/master/${info.country.toLowerCase()}/${slug}.png`;
          }
          channels.push({
            ...info,
            url: t,
            logo: logoUrl
          });
          info = null;
        }
      }
      return channels;
    }

    // Filter by category
    function filterCategory(channels) {
      if (activeCategory === 'all') return channels;
      
      const filters = {
        'sports': /sports|cricket|football|soccer|espn|star|sony|bein|premier|laliga|bundesliga|serie|fox|sky|willow|ptv|golf|tennis|nba|nfl|hockey/i,
        'news': /news|ndtv|abp|republic|aaj|tak|cnn|bbc|al|jazeera|times|now|india|tv18/i,
        'movies': /movies|cinema|film|star|movie|bolawood|hollywood|bwood| Bolly/i,
        'music': /music|mtun|hits|MTV|viva|channel.*v|song/i,
        'entertainment': /entertainment|reality|tv|show|comedy|drama|star|life|zee|sony|colors/i,
        'documentary': /documentary|discovery|national|geo|history|animal|planet/i
      };
      
      const filter = filters[activeCategory];
      if (!filter) return channels;
      
      return channels.filter(ch => 
        filter.test(ch.name) || filter.test(ch.group)
      );
    }

// Play channel - fast switch with multiple URLs
    let urlIndex = 0;
    function playChannel(ch, newUrlIndex = null) {
      currentChannel = ch;
      
      // Support both single url/fallback and array of urls
      const urls = ch.urls || [ch.url, ch.fallback].filter(Boolean);
      if (newUrlIndex !== null) urlIndex = newUrlIndex;
      
      if (urlIndex >= urls.length) {
        nowPlayingEl.innerHTML = `❌ All failed: ${ch.name} <button onclick="retryChannel()" style="background:#e67e22;border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;margin-left:10px;">🔄 Retry All</button>`;
        return;
      }
      
      const url = urls[urlIndex];
      const label = urlIndex > 0 ? ` (URL ${urlIndex + 1})` : '';
      const switchBtns = urls.length > 1 ? urls.map((u, i) => 
        `<button onclick="playChannel(currentChannel, ${i})" style="background:${i === urlIndex ? '#4a9eff' : '#666'};border:none;color:#fff;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:12px;margin-left:5px;">${i + 1}</button>`
      ).join('') : '';
      
      nowPlayingEl.innerHTML = `Playing: ${ch.name}${label} <button onclick="togglePiP()" style="background:#4a9eff;border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;margin-left:10px;">PiP</button>${switchBtns} <button onclick="toggleMiniPlayer()" style="background:#666;border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;margin-left:5px;">Mini</button>`;
      
      // Fast cleanup
      if (hls) { hls.stopLoad(); hls.destroy(); hls = null; }
      player.pause();
      player.removeAttribute('src');
      player.load();
      
      // Hide iframe
      let iframe = document.getElementById('yonoFrame');
      if (iframe) { iframe.src = 'about:blank'; iframe.style.display = 'none'; }
      player.style.display = 'block';
      
      // Get all URLs for this channel
      const allUrls = ch.urls || [ch.url, ch.fallback].filter(Boolean);
      const currentUrl = allUrls[urlIndex];
      
      // Check if HLS.js is needed
      if (currentUrl.includes('.m3u8')) {
        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          // Fast load: destroy old, create new with optimized config
          if (hls) { hls.destroy(); hls = null; }
          hls = new Hls({
            fragLoadingMaxRetry: 1,
            manifestLoadingMaxRetry: 1,
            startFragPrefetch: true,
            lowLatencyMode: false,
            backBufferLength: 30
          });
          hls.loadSource(currentUrl);
          hls.attachMedia(player);
          hls.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal && urlIndex < allUrls.length - 1) {
              urlIndex++;
              playChannel(ch);
            }
          });
          player.play().catch(() => {
            if (urlIndex < allUrls.length - 1) {
              urlIndex++;
              playChannel(ch);
            }
          });
        } else {
          player.style.display = 'none';
          if (!iframe) {
            iframe = document.createElement('iframe');
            iframe.id = 'yonoFrame';
            iframe.style.cssText = 'width:100%;height:100%;border:none;';
            iframe.setAttribute('allowfullscreen', '');
            document.querySelector('.video-wrap').appendChild(iframe);
          }
          iframe.src = currentUrl;
          iframe.style.display = 'block';
        }
      } else if (currentUrl.includes('.ts') || currentUrl.includes('/live/') && currentUrl.includes('?')) {
        player.style.display = 'none';
        if (!iframe) {
          iframe = document.createElement('iframe');
          iframe.id = 'yonoFrame';
          iframe.style.cssText = 'width:100%;height:100%;border:none;';
          iframe.setAttribute('allowfullscreen', '');
          document.querySelector('.video-wrap').appendChild(iframe);
        }
        iframe.onerror = () => {
          if (urlIndex < allUrls.length - 1) {
            urlIndex++;
            playChannel(ch);
          }
        };
iframe.src = currentUrl;
        iframe.style.display = 'block';
      } else {
        player.src = currentUrl;
        player.play().catch(() => {
          if (urlIndex < allUrls.length - 1) {
            urlIndex++;
            playChannel(ch);
          }
        });
      }
    }

    // Load playlist
    async function loadPlaylist() {
      const url = playlistUrlInput.value.trim();
      if (!url) return;
      
      // YonoTV - direct iframe, no playlist to fetch
      if (url.includes('yonotv.pages.dev')) {
        allChannels = [{ name: 'YonoTV Live', url: url, group: 'Live' }];
        renderChannels();
        return;
      }
      
      channelListEl.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Loading channels...</div>';
      
      try {
        let fetchUrl = url;
        // Check if it's a direct m3u8 URL - play directly
        if (url.endsWith('.m3u8') && (url.startsWith('http://') || url.includes('.'))) {
          // Direct m3u8 - play directly without fetching playlist
          allChannels = [{ name: 'Live Stream', url: url, group: 'Live', logo: '' }];
          renderChannels();
          return;
        }
        
        // Use CORS proxy for other URLs
        if (!url.includes(window.location.host) && !url.includes('localhost')) {
          fetchUrl = url;
        }
        
        const response = await fetch(fetchUrl);
        if (!response.ok) throw new Error('Failed to fetch: ' + response.status);
        
        const text = await response.text();
        if (!text || text.length < 100) throw new Error('Empty or invalid response');
        
        // Check if it's a direct HLS stream (live stream, not a channel list)
        if (text.includes('#EXT-X-VERSION') || text.includes('#EXT-X-TARGETDURATION') || (!text.includes('#EXTINF:') && text.includes('.ts'))) {
          // Direct HLS stream - play directly
          allChannels = [{ name: 'Live Stream', url: url, group: 'Live', logo: '' }];
          renderChannels();
          return;
        }
        
        allChannels = parseM3U(text);
        
        if (allChannels.length === 0) {
          channelListEl.innerHTML = '<div class="loading">No channels found in playlist</div>';
          return;
        }
        
        // Sort by name
        allChannels.sort((a, b) => a.name.localeCompare(b.name));
        
        renderChannels();
      } catch (error) {
        console.error('Error:', error);
        channelListEl.innerHTML = `<div class="loading" style="color:#f55">Error: ${error.message}<br><br>Tip: Check console for details</div>`;
      }
    }

    }
    
    // Floating Player Drag
    const floatPlayer = document.getElementById('floatPlayer');
    const floatControls = floatPlayer.querySelector('.float-controls');
    let isDragging = false, startX, startY, initialX, initialY;
    
    floatControls.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX; startY = e.clientY; const rect = floatPlayer.getBoundingClientRect(); initialX = rect.left; initialY = rect.top; floatPlayer.style.right = 'auto'; });
    document.addEventListener('mousemove', (e) => { if (!isDragging) return; e.preventDefault(); const dx = e.clientX - startX, dy = e.clientY - startY; floatPlayer.style.left = (initialX + dx) + 'px'; floatPlayer.style.top = (initialY + dy) + 'px'; });
    document.addEventListener('mouseup', () => isDragging = false);
    
    floatControls.addEventListener('touchstart', (e) => { isDragging = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY; const rect = floatPlayer.getBoundingClientRect(); initialX = rect.left; initialY = rect.top; floatPlayer.style.right = 'auto'; });
    document.addEventListener('touchmove', (e) => { if (!isDragging) return; e.preventDefault(); const dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY; floatPlayer.style.left = (initialX + dx) + 'px'; floatPlayer.style.top = (initialY + dy) + 'px'; }, { passive: false });
    document.addEventListener('touchend', () => isDragging = false);
    
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').style.display = 'inline-block'; });
    function installApp() { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { deferredPrompt = null; }); } }
    
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(r => console.log('SW registered')).catch(e => console.log('SW error', e));
    }
  </script>
</body>
</html>
