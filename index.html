<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>IPTV Player</title>
  <link href="https://unpkg.com/video.js@8/dist/video-js.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui; margin: 0; background: #111; color: #fff; }
    header { padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; }
    header h1 { margin: 0 0 12px 0; font-size: 20px; }
    .input-row { display: flex; gap: 10px; }
    .url-input { flex: 1; padding: 12px 15px; font-size: 14px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; }
    .url-input:focus { border-color: #4a9eff; outline: none; }
    .load-btn { padding: 12px 24px; background: #4a9eff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .load-btn:hover { background: #3a8eef; }
    
    .container { display: flex; height: calc(100vh - 130px); }
    .sidebar { width: 320px; background: #1a1a1a; border-right: 1px solid #333; overflow-y: auto; }
    .search-row { padding: 10px; border-bottom: 1px solid #333; }
    .search-input { width: 100%; padding: 10px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; }
    
    .channels { padding: 8px; }
    .channel { display: flex; align-items: center; gap: 12px; padding: 10px; margin-bottom: 6px; background: #252525; border-radius: 8px; cursor: pointer; }
    .channel:hover { background: #333; }
    .channel.playing { background: #1a3a1a; border: 1px solid #3a5a3a; }
    .logo { width: 48px; height: 48px; background: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .logo img { width: 100%; height: 100%; object-fit: contain; }
    .logo span { font-size: 18px; color: #666; }
    .ch-info { flex: 1; }
    .ch-name { font-weight: 600; font-size: 14px; }
    .ch-country { font-size: 12px; color: #888; }
    
    .main { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; }
    .now-playing { padding: 12px 16px; font-size: 14px; color: #888; }
    .video-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .video-wrap video { width: 100%; height: 100%; background: #000; border-radius: 12px; }
    
    .loading { text-align: center; padding: 40px; color: #888; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid #333; border-top: 3px solid #4a9eff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .chips { display: flex; gap: 8px; padding: 10px; flex-wrap: wrap; border-bottom: 1px solid #333; }
    .chip { padding: 6px 14px; background: #252525; border-radius: 20px; font-size: 12px; cursor: pointer; }
    .chip.active { background: #4a9eff; }
  </style>
</head>
<body>
  <header>
    <h1>IPTV Player</h1>
    <div class="input-row">
      <input type="text" class="url-input" id="playlistUrl" placeholder="Paste M3U/M3U8 playlist URL..." value="https://opentivu.netlify.app/api/it" />
      <button class="load-btn" onclick="loadPlaylist()">Load</button>
    </div>
  </header>

  <div class="container">
    <aside class="sidebar">
      <div class="search-row">
        <input type="text" class="search-input" id="searchInput" placeholder="Search channels..." />
      </div>
      <div class="chips">
        <div class="chip active" data-cat="all">All</div>
        <div class="chip" data-cat="sports">Sports</div>
        <div class="chip" data-cat="news">News</div>
        <div class="chip" data-cat="movies">Movies</div>
        <div class="chip" data-cat="music">Music</div>
      </div>
      <div class="channels" id="channelList"></div>
    </aside>

    <main class="main">
      <div class="now-playing" id="nowPlaying">Select a channel to play</div>
      <div class="video-wrap">
        <video id="player" controls preload="auto" playsinline></video>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const player = document.getElementById('player');
    const channelListEl = document.getElementById('channelList');
    const nowPlayingEl = document.getElementById('nowPlaying');
    const searchInput = document.getElementById('searchInput');
    const playlistUrlInput = document.getElementById('playlistUrl');

    let allChannels = [];
    let currentChannel = null;
    let hls = null;
    let activeCategory = 'all';

    const flags = { 'NP': '🇳🇵', 'IN': '🇮🇳', 'BD': '🇧🇩', 'PK': '🇵🇰', 'LK': '🇱🇰', 'BT': '🇧🇹', 'US': '🇺🇸', 'GB': '🇬🇧', 'AU': '🇦🇺', 'CA': '🇨🇦' };
    const countries = { 'NP': 'Nepal', 'IN': 'India', 'BD': 'Bangladesh', 'PK': 'Pakistan', 'LK': 'Sri Lanka', 'BT': 'Bhutan', 'US': 'USA', 'GB': 'UK', 'AU': 'Australia', 'CA': 'Canada' };

    // Parse M3U
    function parseM3U(text) {
      const channels = [];
      const lines = text.split(/\r?\n/);
      let info = null;

      for (const line of lines) {
        const t = line.trim();
        
        if (t.startsWith('#EXTINF:')) {
          const parts = t.split(',');
          const name = parts[1]?.trim() || 'Unknown';
          const country = ((t.match(/tvg-country="([^"]*)"/) || [])[1] || '').toUpperCase();
          const logo = (t.match(/tvg-logo="([^"]*)"/) || [])[1] || '';
          const group = (t.match(/group-title="([^"]*)"/) || [])[1] || '';
          info = { name, country, logo, group };
        }
        else if (info && !t.startsWith('#') && (t.includes('.m3u8') || t.includes('.m3u'))) {
          // Generate logo URL if not provided
          let logoUrl = info.logo;
          if (!logoUrl || !logoUrl.startsWith('http')) {
            const slug = info.name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');
            logoUrl = `https://raw.githubusercontent.com/iptv-org/logos/master/${info.country.toLowerCase()}/${slug}.png`;
          }
          channels.push({
            ...info,
            url: t,
            logo: logoUrl
          });
          info = null;
        }
      }
      return channels;
    }

    // Filter by category
    function filterCategory(channels) {
      if (activeCategory === 'all') return channels;
      
      const filters = {
        'sports': /sports|cricket|football|soccer|espn|star|sony|bein|premier|laliga|bundesliga|serie|fox|sky|willow|ptv/i,
        'news': /news|ndtv|abp|republic|aaj|tak|cnn|bbc|al|jazeera/i,
        'movies': /movies|cinema|film|star|movie|bolawood|hollywood/i,
        'music': /music|mtun|hits|MTV|viva|channel.*v/i
      };
      
      const filter = filters[activeCategory];
      if (!filter) return channels;
      
      return channels.filter(ch => 
        filter.test(ch.name) || filter.test(ch.group)
      );
    }

    // Render channels
    function renderChannels() {
      let filtered = allChannels;
      
      // Category filter
      filtered = filterCategory(filtered);
      
      // Search filter
      const search = searchInput.value.toLowerCase();
      if (search) {
        filtered = filtered.filter(ch => 
          ch.name.toLowerCase().includes(search) ||
          ch.country.toLowerCase().includes(search) ||
          ch.group.toLowerCase().includes(search)
        );
      }

      channelListEl.innerHTML = '';
      
      if (filtered.length === 0) {
        channelListEl.innerHTML = '<div class="loading">No channels found</div>';
        return;
      }

      filtered.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel' + (currentChannel?.url === ch.url ? ' playing' : '');
        
        const logoDiv = document.createElement('div');
        logoDiv.className = 'logo';
        const img = document.createElement('img');
        img.src = ch.logo;
        img.onerror = () => {
          logoDiv.innerHTML = `<span>${flags[ch.country] || ch.name[0]}</span>`;
        };
        logoDiv.appendChild(img);
        
        const infoDiv = document.createElement('div');
        infoDiv.className = 'ch-info';
        infoDiv.innerHTML = `<div class="ch-name">${ch.name}</div><div class="ch-country">${countries[ch.country] || ch.country || ch.group}</div>`;
        
        div.appendChild(logoDiv);
        div.appendChild(infoDiv);
        div.onclick = () => playChannel(ch);
        channelListEl.appendChild(div);
      });
    }

    // Use direct URL (no proxy for playlist, let browser handle it)
    function getStreamUrl(url) {
      return url;
    }

    // Play channel
    function playChannel(ch) {
      currentChannel = ch;
      nowPlayingEl.textContent = `Playing: ${ch.name}`;
      
      // Update UI
      document.querySelectorAll('.channel').forEach(c => c.classList.remove('playing'));
      renderChannels();
      
      // Destroy previous hls
      if (hls) {
        hls.destroy();
        hls = null;
      }
      player.pause();
      player.src = '';

      const streamUrl = getStreamUrl(ch.url);

      // Try native HLS (Safari) - but Safari might not work with proxy
      if (player.canPlayType('application/vnd.apple.mpegurl') && false) {
        player.src = streamUrl;
        player.load();
        player.play().catch(() => {});
      }
      // Use hls.js with proxy
      else if (Hls.isSupported()) {
        hls = new Hls({
          enableWorker: true,
          lowLatencyMode: false,
          maxBufferLength: 30,
          maxMaxBufferLength: 60,
          maxBufferSize: 60 * 1000 * 1000,
          maxBufferHole: 0.5,
          startLevel: -1
        });
        
        hls.loadSource(streamUrl);
        hls.attachMedia(player);
        
        hls.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) {
            console.error('HLS Error:', data);
          }
        });
        
        player.play().catch(() => {});
      }
      // Fallback - direct
      else {
        player.src = streamUrl;
        player.load();
        player.play().catch(() => {});
      }
    }

    // Load playlist
    async function loadPlaylist() {
      const url = playlistUrlInput.value.trim();
      if (!url) return;
      
      channelListEl.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Loading channels...</div>';
      
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Failed to fetch: ' + response.status);
        
        const text = await response.text();
        if (!text || text.length < 100) throw new Error('Empty or invalid response');
        
        allChannels = parseM3U(text);
        
        if (allChannels.length === 0) {
          channelListEl.innerHTML = '<div class="loading">No channels found in playlist</div>';
          return;
        }
        
        // Sort by name
        allChannels.sort((a, b) => a.name.localeCompare(b.name));
        
        renderChannels();
      } catch (error) {
        console.error('Error:', error);
        channelListEl.innerHTML = `<div class="loading" style="color:#f55">Error: ${error.message}<br><br>Tip: Run 'node server.js' then open http://localhost:3000</div>`;
      }
    }

    // Events
    searchInput.addEventListener('input', renderChannels);
    
    playlistUrlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadPlaylist();
    });
    
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeCategory = chip.dataset.cat;
        renderChannels();
      });
    });

    // Auto-load default playlist
    loadPlaylist();
  </script>
</body>
</html>
