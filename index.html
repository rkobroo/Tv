<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Live Sports TV</title>
  <link href="https://unpkg.com/video.js@8/dist/video-js.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui; margin: 0; background: #111; color: #fff; }
    header { padding: 12px 16px; background: #1a1a1a; display: flex; align-items: center; gap: 16px; }
    header h1 { margin: 0; font-size: 18px; }
    .btn { background: #333; color: #fff; border: none; padding: 8px 16px; cursor: pointer; border-radius: 4px; }
    #status { color: #888; font-size: 13px; }
    .container { display: flex; height: calc(100vh - 56px); }
    .sidebar { width: 300px; background: #1a1a1a; overflow-y: auto; padding: 10px; }
    .channel { padding: 12px; margin-bottom: 6px; background: #222; cursor: pointer; border-radius: 6px; display: flex; align-items: center; gap: 10px; }
    .channel:hover { background: #333; }
    .channel.playing { background: #1a3a1a; }
    .logo { width: 40px; height: 40px; background: #000; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .logo img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
    .info { flex: 1; }
    .name { font-weight: 600; font-size: 14px; }
    .country { font-size: 12px; color: #888; }
    .main { flex: 1; padding: 16px; display: flex; flex-direction: column; }
    #nowPlaying { margin-bottom: 10px; font-size: 14px; }
    .video-wrap { flex: 1; background: #000; border-radius: 10px; overflow: hidden; min-height: 300px; }
    .video-js { width: 100%; height: 100%; }
    .notice { background: #2a2a1a; padding: 10px; margin: 10px; border-radius: 6px; font-size: 12px; }
    .notice a { color: #7ecbff; }
  </style>
</head>
<body>
  <header>
    <h1>Live Sports TV</h1>
    <span id="status">Loading...</span>
  </header>

  <div class="container">
    <aside class="sidebar">
      <div class="notice">
        <strong>Important:</strong> For video to work, deploy to <a href="https://vercel.com" target="_blank">Vercel</a> (free):<br>
        <code style="font-size:11px">npx vercel</code>
      </div>
      <div id="channelList"></div>
    </aside>
    <main class="main">
      <div id="nowPlaying">Select a channel</div>
      <div class="video-wrap">
        <video id="player" class="video-js" controls preload="auto" playsinline></video>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/video.js@8/dist/video.min.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const listEl = document.getElementById('channelList');
    const nowPlayingEl = document.getElementById('nowPlaying');

    let channels = [];
    let current = null;

    const flags = { 'NP': '🇳🇵', 'IN': '🇮🇳', 'BD': '🇧🇩', 'PK': '🇵🇰', 'LK': '🇱🇰', 'US': '🇺🇸', 'GB': '🇬🇧' };
    const countries = { 'NP': 'Nepal', 'IN': 'India', 'BD': 'Bangladesh', 'PK': 'Pakistan', 'LK': 'Sri Lanka', 'US': 'USA', 'GB': 'UK' };

    // Try multiple proxies
    const PROXIES = [
      (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
      (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      (u) => `/proxy?url=${encodeURIComponent(u)}`
    ];
    let proxyIdx = 0;

    function getProxyUrl(url) {
      return PROXIES[proxyIdx](url);
    }

    const player = videojs('player', { autoplay: true, controls: true, preload: 'auto', fluid: true });
    
    player.on('error', function() {
      const err = player.error();
      statusEl.textContent = `Error: ${err?.message || 'Playback failed'}`;
      // Try next proxy
      if (proxyIdx < PROXIES.length - 1) {
        proxyIdx++;
        if (current) play(current);
      }
    });
    
    player.on('playing', () => statusEl.textContent = 'Playing');
    player.on('waiting', () => statusEl.textContent = 'Buffering...');

    // Parse M3U
    function parseM3U(text) {
      const chs = [], lines = text.split(/\r?\n/);
      let info = null;
      for (const line of lines) {
        const t = line.trim();
        if (t.startsWith('#EXTINF:')) {
          const parts = t.split(',');
          const name = parts[1]?.trim() || 'Unknown';
          const country = ((t.match(/tvg-country="([^"]*)"/) || [])[1] || '').toUpperCase();
          const logo = (t.match(/tvg-logo="([^"]*)"/) || [])[1] || '';
          info = { name, country, logo };
        } else if (info && !t.startsWith('#') && t.includes('.m3u')) {
          let logoUrl = info.logo;
          if (!logoUrl?.startsWith('http')) {
            const slug = info.name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');
            logoUrl = `https://raw.githubusercontent.com/iptv-org/logos/master/${info.country.toLowerCase()}/${slug}.png`;
          }
          const n = info.name.toLowerCase();
          if (/sports|cricket|football|soccer|espn|star|sony|bein|premier/i.test(n) || ['IN', 'NP', 'BD', 'PK', 'LK'].includes(info.country)) {
            chs.push({ ...info, url: t, logo: logoUrl });
          }
          info = null;
        }
      }
      return chs;
    }

    // Sort
    function sortChs(chs) {
      const p = ['sony', 'star', 'willow', 'ptv', 'cricket', 'espn'];
      return chs.sort((a, b) => {
        let ia = p.findIndex(x => a.name.toLowerCase().includes(x));
        let ib = p.findIndex(x => b.name.toLowerCase().includes(x));
        if (ia === -1) ia = 99;
        if (ib === -1) ib = 99;
        if (ia !== ib) return ia - ib;
        return a.name.localeCompare(b.name);
      });
    }

    // Render
    function render() {
      listEl.innerHTML = '';
      channels.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel' + (current?.url === ch.url ? ' playing' : '');
        
        const logoDiv = document.createElement('div');
        logoDiv.className = 'logo';
        const img = document.createElement('img');
        img.src = ch.logo;
        img.onerror = () => { logoDiv.textContent = flags[ch.country] || ch.name[0]; };
        logoDiv.appendChild(img);
        
        const infoDiv = document.createElement('div');
        infoDiv.className = 'info';
        infoDiv.innerHTML = `<div class="name">${ch.name}</div><div class="country">${countries[ch.country] || ch.country}</div>`;
        
        div.appendChild(logoDiv);
        div.appendChild(infoDiv);
        div.onclick = () => play(ch);
        listEl.appendChild(div);
      });
    }

    // Play
    function play(ch) {
      current = ch;
      nowPlayingEl.textContent = `Playing: ${ch.name}`;
      statusEl.textContent = 'Loading...';
      
      document.querySelectorAll('.channel').forEach(c => c.classList.remove('playing'));
      render();
      
      player.src({ src: getProxyUrl(ch.url), type: 'application/x-mpegURL' });
      player.play().catch(() => statusEl.textContent = 'Click play');
    }

    // Load
    async function load() {
      try {
        const r = await fetch('https://iptv-org.github.io/iptv/index.m3u');
        if (!r.ok) throw new Error();
        channels = sortChs(parseM3U(await r.text()));
        if (channels.length === 0) throw new Error();
        statusEl.textContent = `${channels.length} channels loaded`;
        render();
        play(channels[0]);
      } catch {
        statusEl.textContent = 'Failed to load channels';
      }
    }

    load();
  </script>
</body>
</html>
