<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>IPTV Player</title>
  <link href="https://unpkg.com/video.js@8/dist/video-js.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui; margin: 0; background: #111; color: #fff; }
    header { padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; }
    header h1 { margin: 0 0 12px 0; font-size: 20px; }
    .input-row { display: flex; gap: 10px; }
    .url-input { flex: 1; padding: 12px 15px; font-size: 14px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; }
    .url-input:focus { border-color: #4a9eff; outline: none; }
    .load-btn { padding: 12px 24px; background: #4a9eff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .load-btn:hover { background: #3a8eef; }
    
    .container { display: flex; height: calc(100vh - 130px); }
    .sidebar { width: 320px; background: #1a1a1a; border-right: 1px solid #333; overflow-y: auto; }
    .search-row { padding: 10px; border-bottom: 1px solid #333; background: #151515; }
    .search-input { width: 100%; padding: 10px 15px; background: #2a2a2a; color: #fff; border: 1px solid #555; border-radius: 8px; font-size: 14px; }
    .search-input:focus { border-color: #4a9eff; outline: none; background: #333; }
    
    .channels { padding: 8px; }
    .channel { display: flex; align-items: center; gap: 12px; padding: 10px; margin-bottom: 6px; background: #252525; border-radius: 8px; cursor: pointer; }
    .channel:hover { background: #333; }
    .channel.playing { background: #1a3a1a; border: 1px solid #3a5a3a; }
    .logo { width: 48px; height: 48px; background: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .logo img { width: 100%; height: 100%; object-fit: contain; }
    .logo span { font-size: 18px; color: #666; }
    .ch-info { flex: 1; }
    .ch-name { font-weight: 600; font-size: 14px; }
    .ch-country { font-size: 12px; color: #888; }
    
    .main { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; }
    .now-playing { padding: 12px 16px; font-size: 14px; color: #888; }
    .video-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .video-wrap video { width: 100%; height: 100%; background: #000; border-radius: 12px; }
    
    .loading { text-align: center; padding: 40px; color: #888; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid #333; border-top: 3px solid #4a9eff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .chips { display: flex; gap: 8px; padding: 10px; flex-wrap: wrap; border-bottom: 1px solid #333; }
    .chip { padding: 6px 14px; background: #252525; border-radius: 20px; font-size: 12px; cursor: pointer; }
    .chip.active { background: #4a9eff; }
    
    .live-match { display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 8px; background: linear-gradient(135deg, #1a2a1a 0%, #252525 100%); border-radius: 10px; cursor: pointer; border: 1px solid #2a4a2a; }
    .live-match:hover { background: linear-gradient(135deg, #2a3a2a 0%, #2f2f2f 100%); border-color: #4a6a4a; }
    .live-badge { background: #e00; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .match-teams { flex: 1; text-align: center; }
    .match-teams .teams { font-weight: 600; font-size: 13px; }
    .match-teams .time { font-size: 11px; color: #888; margin-top: 4px; }
    .match-info { text-align: center; font-size: 11px; color: #888; }
    
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-overlay.show { display: flex; }
    .modal { background: #1a1a1a; border-radius: 16px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; border: 1px solid #333; }
    .modal-header { padding: 16px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { margin: 0; font-size: 18px; }
    .modal-close { background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
    .modal-body { padding: 16px; }
    .stream-link { display: block; padding: 14px 16px; margin-bottom: 10px; background: #252525; border-radius: 10px; cursor: pointer; border: 1px solid #333; transition: all 0.2s; }
    .stream-link:hover { background: #2f2f2f; border-color: #4a9eff; transform: translateX(4px); }
    .stream-link .name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .stream-link .quality { font-size: 11px; color: #4a9eff; }
    .match-detail { background: #252525; padding: 16px; border-radius: 10px; margin-bottom: 16px; }
    .match-detail .vs { font-size: 24px; font-weight: bold; text-align: center; margin: 10px 0; }
    .match-detail .league { font-size: 12px; color: #888; text-align: center; }
    
    /* Floating Player */
    .float-player { position: fixed; bottom: 20px; right: 20px; z-index: 9999; background: #000; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); overflow: hidden; transition: all 0.3s ease; }
    .float-player.collapsed { width: 60px !important; height: 45px !important; }
    .float-player.size-small { width: 200px; height: 150px; }
    .float-player.size-medium { width: 420px; height: 320px; }
    .float-player.size-large { width: 640px; height: 480px; }
    .float-player iframe { width: 100%; height: 100%; border: none; }
    .float-controls { position: absolute; top: 0; left: 0; right: 0; height: 30px; background: rgba(0,0,0,0.7); display: flex; justify-content: space-between; align-items: center; padding: 0 8px; opacity: 0; transition: opacity 0.2s; }
    .float-player:hover .float-controls { opacity: 1; }
    .float-btn { background: none; border: none; color: #fff; font-size: 12px; cursor: pointer; padding: 4px 8px; }
    .float-btn:hover { color: #4a9eff; }
    .float-title { color: #fff; font-size: 12px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1; }
  </style>
</head>
<body>
  <!-- Floating Player -->
  <div id="floatPlayer" class="float-player size-medium collapsed" style="display:none;">
    <div class="float-controls">
      <span class="float-title" id="floatTitle">Playing</span>
      <button class="float-btn" onclick="toggleFloatSize()">📐</button>
      <button class="float-btn" onclick="minimizeFloat()">_</button>
      <button class="float-btn" onclick="closeFloat()">✕</button>
    </div>
    <iframe id="floatIframe" src=""></iframe>
  </div>

  <header>

    <div class="input-row">

        <option value="https://iptv-org.github.io/iptv/countries/us.m3u">🇺🇸 USA Sports</option>
        <option value="https://iptv-org.github.io/iptv/countries/uk.m3u">🇬🇧 UK Sports</option>

        <option value="https://iptv-org.github.io/iptv/countries/fr.m3u">🇫🇷 France Sports</option>

        <option value="https://iptv-org.github.io/iptv/countries/ca.m3u">🇨🇦 Canada</option>
        <option value="https://iptv-org.github.io/iptv/countries/fr.m3u">🇫🇷 France</option>
        <option value="https://iptv-org.github.io/iptv/countries/es.m3u">🇪🇸 Spain</option>
        <option value="https://iptv-org.github.io/iptv/countries/it.m3u">🇮🇹 Italy</option>

        <option value="https://iptv-org.github.io/iptv/countries/kr.m3u">🇰🇷 South Korea</option>

        <option value="https://iptv-org.github.io/iptv/categories/kids.m3u">🧒 Kids</option>
        <option value="https://iptv-org.github.io/iptv/categories/learning.m3u">📚 Education</option>
      </select>
      <button class="load-btn" onclick="loadPlaylist()">Load</button>
    </div>
  </header>

  <div class="container">
    <aside class="sidebar">
      <div class="search-row">
        <input type="text" class="search-input" id="searchInput" placeholder="Search channels..." />
      </div>
      <div class="chips">
        <div class="chip active" data-cat="all">All</div>
        <div class="chip" data-cat="sports">Sports</div>
        <div class="chip" data-cat="news">News</div>
        <div class="chip" data-cat="movies">Movies</div>
        <div class="chip" data-cat="music">Music</div>
        <div class="chip" data-cat="entertainment">Entertainment</div>
        <div class="chip" data-cat="documentary">Documentary</div>
      </div>
      <div class="channels" id="channelList"></div>
    </aside>

    <main class="main">
      <div class="now-playing" id="nowPlaying">Select a channel to play</div>
      <div class="video-wrap">
        <video id="player" controls preload="auto" playsinline></video>
      </div>
    </main>
  </div>
  
  <div class="modal-overlay" id="streamModal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="modalTitle">Streaming Links</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const player = document.getElementById('player');
    const channelListEl = document.getElementById('channelList');
    const nowPlayingEl = document.getElementById('nowPlaying');
    const searchInput = document.getElementById('searchInput');
    const playlistUrlInput = document.getElementById('playlistUrl');

    let allChannels = [];
    let currentChannel = null;
let hls = null;
    let activeCategory = 'all';
    let isLiveMatchesMode = false;
    let cachedMatches = null;
    let cachedStreamLinks = {};
    
    // Default matches (fallback)
    const defaultMatches = [
      { id: 'ipl', name: 'IPL 2026', team1: 'RCB', team2: 'SRH', time: 'LIVE', league: 'Indian Premier League', stadium: 'Rajiv Gandhi International Stadium' },
      { id: 'psl', name: 'PSL 2026', team1: 'Islamabad United', team2: 'Lahore Qalandars', time: 'LIVE', league: 'Pakistan Super League', stadium: 'Rawalpindi Cricket Stadium' },
      { id: 'bbl', name: 'BBL 2026', team1: 'Sydney Sixers', team2: 'Sydney Thunder', time: '19:30', league: 'Big Bash League', stadium: 'SCG' },
      { id: 'cpl', name: 'CPL 2026', team1: 'Trinbago', team2: 'St Kitts', time: '20:00', league: 'Caribbean Premier League', stadium: 'Brian Lara Cricket Academy' },
      { id: 'wpl', name: 'WPL 2026', team1: 'Mumbai Indians', team2: 'Delhi Capitals', time: '14:00', league: 'Womens Premier League', stadium: 'Brabourne Stadium' }
    ];
    
    // Default stream links (fallback)
    const defaultStreamLinks = {
      'ipl': [
        { name: 'Smoothlink 1 - Hindi', quality: 'HD 720p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=ipl1' },
        { name: 'Smoothlink 2 - Hindi', quality: 'HD 720p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=ipl2' },
        { name: 'HD Link 1 - English', quality: 'FHD 1080p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=ipl3' },
        { name: 'HD Link 2 - Tamil', quality: 'HD 720p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=ipl4' },
        { name: 'SD Link - Telugu', quality: 'SD 480p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=ipl5' }
      ],
      'psl': [
        { name: 'Smoothlink 1 - Urdu', quality: 'HD 720p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=psl1' },
        { name: 'Smoothlink 2 - English', quality: 'HD 720p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=psl2' },
        { name: 'HD Link 1 - Punjabi', quality: 'FHD 1080p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=psl3' }
      ],
      'bbl': [
        { name: 'Smoothlink 1 - English', quality: 'HD 720p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=bbl1' },
        { name: 'HD Link 1 - Hindi', quality: 'HD 720p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=bbl2' }
      ],
      'cpl': [
        { name: 'Smoothlink 1 - English', quality: 'HD 720p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=cpl1' },
        { name: 'HD Link 1 - Hindi', quality: 'FHD 1080p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=cpl2' }
      ],
      'wpl': [
        { name: 'Smoothlink 1 - Hindi', quality: 'HD 720p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=wpl1' },
        { name: 'Smoothlink 2 - English', quality: 'HD 720p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=wpl2' },
        { name: 'HD Link 1 - Tamil', quality: 'FHD 1080p', url: 'https://yonotv.pages.dev/page?src=https://yonotv.pages.dev/LINK?id=wpl3' }
]
    };
    
    function closeModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('streamModal').classList.remove('show');
    }
    
    function showStreamLinks(match) {
      const modal = document.getElementById('streamModal');
      const modalTitle = document.getElementById('modalTitle');
      const modalBody = document.getElementById('modalBody');
      
      modalTitle.textContent = `${match.team1} vs ${match.team2}`;
      
      const detailHtml = `
        <div class="match-detail">
          <div class="league">${match.league}</div>
          <div class="vs">${match.team1} <span style="color:#4a9eff">VS</span> ${match.team2}</div>
          <div class="match-info">${match.stadium}</div>
        </div>
      `;
      
      linksHtml += `
        <div class="stream-link" onclick="openMatchPage('${match.id}')">
          <div class="name">Open Match Page</div>
          <div class="quality">Click to get HD/Smooth links</div>
        </div>
      `;
      
      modalBody.innerHTML = detailHtml + linksHtml;
      modal.classList.add('show');
    }
    
    function playStream(url) {
      closeModal();
      playChannel({ name: 'Live Stream', url: url, group: 'Live' });
    }
    
    function openMatchPage(matchId) {
      closeModal();
      // Show buttons to open newsecrettips page
      const matchUrl = 'https://www.newsecrettips.com/p/match-data.html?id=' + matchId;
      nowPlayingEl.textContent = 'Opening match page...';
      
      // Open in new tab
      window.open(matchUrl, '_blank');
      
      // Also show in iframe
      player.style.display = 'none';
      let iframe = document.getElementById('yonoFrame');
      if (!iframe) {
        iframe = document.createElement('iframe');
        iframe.id = 'yonoFrame';
        iframe.style.cssText = 'width:100%;height:100%;border:none;';
        iframe.setAttribute('allowfullscreen', '');
        document.querySelector('.video-wrap').appendChild(iframe);
      }
      iframe.src = matchUrl;
      iframe.style.display = 'block';
    }

    function renderLiveMatches() {
      channelListEl.innerHTML = '';
      
      const matches = cachedMatches || defaultMatches;
      
      matches.forEach(match => {
        const div = document.createElement('div');
        div.className = 'live-match';
        div.innerHTML = `
          <div class="live-badge">LIVE</div>
          <div class="match-teams">
            <div class="teams">${match.team1} vs ${match.team2}</div>
            <div class="time">${match.time} | ${match.league}</div>
          </div>
        `;
        div.onclick = () => showStreamLinks(match);
        channelListEl.appendChild(div);
      });
    }

    const flags = { 'NP': '🇳🇵', 'IN': '🇮🇳', 'BD': '🇧🇩', 'PK': '🇵🇰', 'LK': '🇱🇰', 'BT': '🇧🇹', 'US': '🇺🇸', 'GB': '🇬🇧', 'AU': '🇦🇺', 'CA': '🇨🇦', 'IT': '🇮🇹', 'DE': '🇩🇪', 'FR': '🇫🇷', 'ES': '🇪🇸', 'BR': '🇧🇷', 'MX': '🇲🇽', 'JP': '🇯🇵', 'KR': '🇰🇷', 'CN': '🇨🇳', 'RU': '🇷🇺' };
    const countries = { 'NP': 'Nepal', 'IN': 'India', 'BD': 'Bangladesh', 'PK': 'Pakistan', 'LK': 'Sri Lanka', 'BT': 'Bhutan', 'US': 'USA', 'GB': 'UK', 'AU': 'Australia', 'CA': 'Canada', 'IT': 'Italy', 'DE': 'Germany', 'FR': 'France', 'ES': 'Spain', 'BR': 'Brazil', 'MX': 'Mexico', 'JP': 'Japan', 'KR': 'South Korea', 'CN': 'China', 'RU': 'Russia' };

    // Load preset source
    function loadPreset() {
      const select = document.getElementById('presetSelect');
      const url = select.value;
      
      // iplstreams - open in main player
      if (url.startsWith('https://iplstreams.com/')) {
        const streamTitle = select.options[select.selectedIndex].text;
        loadIplstreams(url, streamTitle);
        return;
      }
      
      if (url === '__IPLSTREAMS__') {
        showFloatPlayer('https://iplstreams.com/willow-2', 'Willow TV');
        return;
      }
      
      if (url === '__LIVE_MATCHES__') {
        isLiveMatchesMode = true;
        allChannels = [];
        nowPlayingEl.textContent = 'Loading matches...';
        renderLiveMatches();
        return;
      }
      
      isLiveMatchesMode = false;
      
      if (url) {
        playlistUrlInput.value = url;
        loadPlaylist();
      }
    }
    
    function loadIplstreams(url, title) {
      nowPlayingEl.innerHTML = title + ' <button onclick="popOutIplstreams()" style="background:#4a9eff;border:none;color:#fff;padding:5px 10px;border-radius:4px;cursor:pointer;margin-left:10px;">Pop Out</button>';
      
      player.style.display = 'none';
      let iframe = document.getElementById('yonoFrame');
      if (!iframe) {
        iframe = document.createElement('iframe');
        iframe.id = 'yonoFrame';
        iframe.style.cssText = 'width:100%;height:100%;border:none;';
        iframe.setAttribute('allowfullscreen', '');
        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-popups allow-forms');
        document.querySelector('.video-wrap').appendChild(iframe);
      }
      iframe.src = url;
      iframe.style.display = 'block';
      currentStreamUrl = url;
    }
    
    let currentStreamUrl = '';
    
    function popOutIplstreams() {
      if (currentStreamUrl) {
        showFloatPlayer(currentStreamUrl, 'Stream');
        document.getElementById('yonoFrame').style.display = 'none';
        document.getElementById('yonoFrame').src = '';
      }
    }

    // Parse M3U
    function parseM3U(text) {
      const channels = [];
      const lines = text.split(/\r?\n/);
      let info = null;

      for (const line of lines) {
        const t = line.trim();
        
        if (t.startsWith('#EXTINF:') || t.startsWith('#EXTINF:-')) {
          const parts = t.split(',');
          const name = parts[1]?.trim() || 'Unknown';
          const country = ((t.match(/tvg-country="([^"]*)"/) || [])[1] || '').toUpperCase();
          const logo = (t.match(/tvg-logo="([^"]*)"/) || [])[1] || '';
          const group = (t.match(/group-title="([^"]*)"/) || [])[1] || '';
          info = { name, country, logo, group };
        }
        else if (info && !t.startsWith('#') && (t.includes('.m3u8') || t.includes('.m3u'))) {
          // Generate logo URL if not provided
          let logoUrl = info.logo;
          if (!logoUrl || !logoUrl.startsWith('http')) {
            const slug = info.name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');
            logoUrl = `https://raw.githubusercontent.com/iptv-org/logos/master/${info.country.toLowerCase()}/${slug}.png`;
          }
          channels.push({
            ...info,
            url: t,
            logo: logoUrl
          });
          info = null;
        }
      }
      return channels;
    }

    // Filter by category
    function filterCategory(channels) {
      if (activeCategory === 'all') return channels;
      
      const filters = {
        'sports': /sports|cricket|football|soccer|espn|star|sony|bein|premier|laliga|bundesliga|serie|fox|sky|willow|ptv|golf|tennis|nba|nfl|hockey/i,
        'news': /news|ndtv|abp|republic|aaj|tak|cnn|bbc|al|jazeera|times|now|india|tv18/i,
        'movies': /movies|cinema|film|star|movie|bolawood|hollywood|bwood| Bolly/i,
        'music': /music|mtun|hits|MTV|viva|channel.*v|song/i,
        'entertainment': /entertainment|reality|tv|show|comedy|drama|star|life|zee|sony|colors/i,
        'documentary': /documentary|discovery|national|geo|history|animal|planet/i
      };
      
      const filter = filters[activeCategory];
      if (!filter) return channels;
      
      return channels.filter(ch => 
        filter.test(ch.name) || filter.test(ch.group)
      );
    }

    // Render channels
    function renderChannels() {
      let filtered = allChannels;
      
      // Category filter
      filtered = filterCategory(filtered);
      
      // Search filter
      const search = searchInput.value.toLowerCase();
      if (search) {
        filtered = filtered.filter(ch => 
          ch.name.toLowerCase().includes(search) ||
          ch.country.toLowerCase().includes(search) ||
          ch.group.toLowerCase().includes(search)
        );
      }

      channelListEl.innerHTML = '';
      
      if (filtered.length === 0) {
        channelListEl.innerHTML = '<div class="loading">No channels found</div>';
        return;
      }

      filtered.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'channel' + (currentChannel?.url === ch.url ? ' playing' : '');
        
        const logoDiv = document.createElement('div');
        logoDiv.className = 'logo';
        const img = document.createElement('img');
        img.src = ch.logo;
        img.onerror = () => {
          logoDiv.innerHTML = `<span>${flags[ch.country] || ch.name[0]}</span>`;
        };
        logoDiv.appendChild(img);
        
        const infoDiv = document.createElement('div');
        infoDiv.className = 'ch-info';
        infoDiv.innerHTML = `<div class="ch-name">${ch.name}</div><div class="ch-country">${countries[ch.country] || ch.country || ch.group}</div>`;
        
        div.appendChild(logoDiv);
        div.appendChild(infoDiv);
        div.onclick = () => playChannel(ch);
        channelListEl.appendChild(div);
      });
    }

    // Get stream URL
    function getStreamUrl(url) {
      return url;
    }

    // Play channel - fast switch
    function playChannel(ch) {
      currentChannel = ch;
      nowPlayingEl.textContent = `Playing: ${ch.name}`;
      
      // Destroy previous hls
      if (hls) {
        hls.destroy();
        hls = null;
      }
      player.pause();
      player.src = '';
      
      // Hide iframe, show video player
      let iframe = document.getElementById('yonoFrame');
      if (iframe) iframe.style.display = 'none';
      player.style.display = 'block';
      
      // Check if HLS.js is needed
      if (ch.url.includes('.m3u8')) {
        if (Hls.isSupported()) {
          hls = new Hls();
          hls.loadSource(ch.url);
          hls.attachMedia(player);
          player.play();
        } else {
          // Fallback to iframe
          player.style.display = 'none';
          if (!iframe) {
            iframe = document.createElement('iframe');
            iframe.id = 'yonoFrame';
            iframe.style.cssText = 'width:100%;height:100%;border:none;';
            iframe.setAttribute('allowfullscreen', '');
            document.querySelector('.video-wrap').appendChild(iframe);
          }
          iframe.src = ch.url;
          iframe.style.display = 'block';
        }
      } else {
        // MP4 or other - use video tag
        player.src = ch.url;
        player.play();
      }
      return;
    }

    // Load playlist
    async function loadPlaylist() {
      const url = playlistUrlInput.value.trim();
      if (!url) return;
      
      // YonoTV - direct iframe, no playlist to fetch
      if (url.includes('yonotv.pages.dev')) {
        allChannels = [{ name: 'YonoTV Live', url: url, group: 'Live' }];
        renderChannels();
        return;
      }
      
      channelListEl.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Loading channels...</div>';
      
      try {
        let fetchUrl = url;
        // Direct fetch for GitHub/raw URLs (CORS enabled)
        if (!url.includes(window.location.host) && !url.includes('localhost')) {
          fetchUrl = url;
        }
        
        const response = await fetch(fetchUrl);
        if (!response.ok) throw new Error('Failed to fetch: ' + response.status);
        
        const text = await response.text();
        if (!text || text.length < 100) throw new Error('Empty or invalid response');
        
        // Check if it's a direct HLS stream (live stream, not a channel list)
        if (text.includes('#EXT-X-VERSION') || text.includes('#EXT-X-TARGETDURATION') || (!text.includes('#EXTINF:') && text.includes('.ts'))) {
          // Direct HLS stream - play directly
          allChannels = [{ name: 'Live Stream', url: url, group: 'Live', logo: '' }];
          renderChannels();
          return;
        }
        
        allChannels = parseM3U(text);
        
        if (allChannels.length === 0) {
          channelListEl.innerHTML = '<div class="loading">No channels found in playlist</div>';
          return;
        }
        
        // Sort by name
        allChannels.sort((a, b) => a.name.localeCompare(b.name));
        
        renderChannels();
      } catch (error) {
        console.error('Error:', error);
        channelListEl.innerHTML = `<div class="loading" style="color:#f55">Error: ${error.message}<br><br>Tip: Check console for details</div>`;
      }
    }

    // Events
    searchInput.addEventListener('input', renderChannels);
    
    playlistUrlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadPlaylist();
    });
    
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeCategory = chip.dataset.cat;
        renderChannels();
      });
    });

    // Auto-load default playlist
    loadPlaylist();
    
    // Floating Player Functions
    let floatSizes = ['small', 'medium', 'large'];
    let currentSize = 1;
    let isMinimized = false;
    
    function showFloatPlayer(url, title) {
      const floatPlayer = document.getElementById('floatPlayer');
      const floatIframe = document.getElementById('floatIframe');
      const floatTitle = document.getElementById('floatTitle');
      
      floatIframe.src = url;
      floatTitle.textContent = title || 'Stream';
      floatPlayer.style.display = 'block';
      floatPlayer.classList.remove('collapsed');
    }
    
    function closeFloat() {
      document.getElementById('floatPlayer').style.display = 'none';
      document.getElementById('floatIframe').src = '';
    }
    
    function minimizeFloat() {
      const floatPlayer = document.getElementById('floatPlayer');
      floatPlayer.classList.toggle('collapsed');
      isMinimized = floatPlayer.classList.contains('collapsed');
    }
    
    function toggleFloatSize() {
      const floatPlayer = document.getElementById('floatPlayer');
      floatSizes.forEach(s => floatPlayer.classList.remove('size-' + s));
      currentSize = (currentSize + 1) % floatSizes.length;
      floatPlayer.classList.add('size-' + floatSizes[currentSize]);
    }
  </script>
</body>
</html>
