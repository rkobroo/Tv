<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Network Stream Player</title>
  <link href="https://unpkg.com/video.js@8/dist/video-js.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui; margin: 0; background: #1a1a1a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 20px; background: #222; text-align: center; }
    header h1 { margin: 0 0 20px 0; font-size: 24px; }
    .input-group { display: flex; gap: 10px; max-width: 900px; margin: 0 auto; }
    .url-input { flex: 1; padding: 14px 18px; font-size: 16px; background: #333; color: #fff; border: 2px solid #444; border-radius: 8px; outline: none; }
    .url-input:focus { border-color: #4a9eff; }
    .url-input::placeholder { color: #888; }
    .play-btn { padding: 14px 30px; font-size: 16px; background: #4a9eff; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .play-btn:hover { background: #3a8eef; }
    
    .video-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: #111; }
    .video-wrapper { width: 100%; max-width: 1200px; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; }
    video { width: 100%; height: 100%; background: #000; }
    
    .sample-links { padding: 20px; text-align: center; background: #1a1a1a; }
    .sample-links h3 { margin: 0 0 15px 0; color: #888; font-size: 14px; }
    .sample-links a { color: #4a9eff; margin: 0 8px; font-size: 13px; text-decoration: none; }
    .sample-links a:hover { text-decoration: underline; }
    
    .status { padding: 10px; text-align: center; color: #888; font-size: 13px; }
    .status.error { color: #ff6b6b; }
    .status.success { color: #5be49b; }
    
    .instructions { padding: 20px; max-width: 600px; margin: 20px auto; background: #222; border-radius: 10px; }
    .instructions h3 { margin: 0 0 10px 0; color: #4a9eff; }
    .instructions p { margin: 8px 0; font-size: 14px; color: #aaa; line-height: 1.6; }
    .instructions code { background: #333; padding: 2px 6px; border-radius: 4px; color: #4a9eff; }
  </style>
</head>
<body>
  <header>
    <h1>Network Stream Player</h1>
    <div class="input-group">
      <input type="text" class="url-input" id="streamUrl" placeholder="Paste stream URL here (e.g., https://example.com/stream.m3u8)" />
      <button class="play-btn" onclick="playStream()">Play</button>
    </div>
  </header>

  <div class="status" id="status">Paste an m3u8 URL and click Play</div>

  <div class="video-container">
    <div class="video-wrapper">
      <video id="player" controls preload="auto" playsinline></video>
    </div>
  </div>

  <div class="sample-links">
    <h3>Sample Working Streams (try these):</h3>
    <a href="#" onclick="loadSample('https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8'); return false;">Test Stream</a>
    <a href="#" onclick="loadSample('https://devstreaming-cdn.apple.com/videos/streaming/examples/img_bipbop_adv_example_fmp4/master.m3u8'); return false;">Apple Demo</a>
    <a href="#" onclick="loadSample('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8'); return false;">Mux Test</a>
  </div>

  <div class="instructions">
    <h3>How to Use:</h3>
    <p>1. Copy a <code>.m3u8</code> stream URL</p>
    <p>2. Paste it in the input box above</p>
    <p>3. Click <code>Play</code></p>
    <p><strong>Tip:</strong> For IPTV channels, copy the direct .m3u8 URL (not the playlist file URL)</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById('player');
    const urlInput = document.getElementById('streamUrl');
    const statusEl = document.getElementById('status');
    let hls = null;

    // Play stream from URL
    function playStream() {
      const url = urlInput.value.trim();
      if (!url) {
        showStatus('Please enter a stream URL', 'error');
        return;
      }
      if (!url.includes('.m3u')) {
        showStatus('URL should end with .m3u or .m3u8', 'error');
        return;
      }
      play(url);
    }

    // Load sample stream
    function loadSample(url) {
      urlInput.value = url;
      play(url);
    }

    // Play the stream
    function play(url) {
      showStatus('Loading stream...', '');
      
      // Destroy previous hls instance
      if (hls) {
        hls.destroy();
        hls = null;
      }
      video.pause();
      video.src = '';

      // Try native HLS (Safari)
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.load();
        video.play().catch(() => showStatus('Click play button to start', ''));
        showStatus('Using native player', 'success');
      }
      // Use hls.js (Chrome, Firefox, etc.)
      else if (Hls.isSupported()) {
        hls = new Hls({
          enableWorker: true,
          lowLatencyMode: false,
          backBufferLength: 30
        });
        
        hls.loadSource(url);
        hls.attachMedia(video);
        
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(() => showStatus('Click play to start', ''));
          showStatus('Playing', 'success');
        });
        
        hls.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) {
            showStatus('Stream error: ' + (data.details || 'Unknown error'), 'error');
          }
        });
      }
      // Fallback
      else {
        video.src = url;
        video.load();
        video.play().catch(() => showStatus('Click play button to start', ''));
      }
    }

    // Show status message
    function showStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + type;
    }

    // Enter key to play
    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') playStream();
    });

    // Handle video events
    video.addEventListener('playing', () => showStatus('Playing', 'success'));
    video.addEventListener('waiting', () => showStatus('Buffering...', ''));
    video.addEventListener('error', () => showStatus('Playback error - stream may be offline', 'error'));
    video.addEventListener('ended', () => showStatus('Stream ended', ''));
  </script>
</body>
</html>
