name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download Gradle
        run: |
          cd android
          rm -rf gradle-*
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.2-bin.zip
          ls -la
      
      - name: Extract and Build
        run: |
          cd android
          unzip -o gradle.zip
          ls -la
          chmod +x gradle-8.2/bin/gradle
          ./gradle-8.2/bin/gradle --version
      
      - name: Build APK
        run: |
          cd android
          pwd
          ls -la
          ls -la app/
          ls -la app/src/
          ls -laR app/src/main/
          ./gradle-8.2/bin/gradle assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rko-live-tv.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk