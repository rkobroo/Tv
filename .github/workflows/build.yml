name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download and extract Gradle 8.2
        run: |
          cd android
          rm -rf gradle-*
          curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o ../gradle.zip
          unzip -q ../gradle.zip
          chmod +x ../gradle-8.2/bin/gradle
          ../gradle-8.2/bin/gradle assembleDebug --no-daemon
          rm -rf ../gradle.zip ../gradle-8.2
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rko-live-tv.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk