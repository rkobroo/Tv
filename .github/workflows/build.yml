name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Generate signing key
        run: |
          keytool -genkeypair -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias release -storepass release123 -keypass release123 -dname "CN=RKO TV, OU=Dev, O=RKO, L=Unknown, ST=Unknown, C=IN"
      
      - name: Download Gradle
        run: |
          cd android
          rm -rf gradle-*
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.2-bin.zip
      
      - name: Extract and Build
        run: |
          cd android
          unzip -o gradle.zip
          chmod +x gradle-8.2/bin/gradle
          ./gradle-8.2/bin/gradle assembleRelease --no-daemon -Pandroid.injected.signing.store.file=$(pwd)/../release.jks -Pandroid.injected.signing.store.password=release123 -Pandroid.injected.signing.key.alias=release -Pandroid.injected.signing.key.password=release123
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rko-live-tv.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7